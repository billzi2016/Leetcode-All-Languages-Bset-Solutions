site_name: LeetCode All Languages Best Solutions
site_description: Accurate best LeetCode solutions across all supported programming languages.
site_url: https://billzi2016.github.io/Leetcode-All-Languages-Best-Solutions/
repo_url: https://github.com/billzi2016/Leetcode-All-Languages-Best-Solutions
repo_name: billzi2016/Leetcode-All-Languages-Best-Solutions
docs_dir: .
site_dir: ../docs-site-build

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

validation:
  links:
    not_found: ignore

nav:
  - Home: index.md
  - English:
      - Overview: en/index.md
      - LeetCode: en/leetcode.md
      - Solution Indexes:
          - Overview: en/solution-indexes.md
          - Easy: en/solution-indexes/Leetcode-Easy/index.md
          - Medium: en/solution-indexes/Leetcode-Medium/index.md
          - Hard: en/solution-indexes/Leetcode-Hard/index.md
      - Languages: en/languages.md
      - Validation: en/validation.md
      - Ollama and Compute Nodes: en/ollama.md
      - Ollama Install: en/ollama-install.md
      - Agent Generation Flow: en/agent.md
      - MkDocs: en/mkdocs.md
      - GitHub Actions: en/github-actions.md
      - End-to-End Workflow: en/workflow.md
      - PRD: en/prd.md
      - MkDocs Site PRD: mkdocs_prd.md
      - GitHub Actions PRD: github_action_prd.md
  - 中文:
      - 总览: cn/index.md
      - LeetCode: cn/leetcode.md
      - 题目清单:
          - 总览: cn/solution-indexes.md
          - Easy: cn/solution-indexes/Leetcode-Easy/index.md
          - Medium: cn/solution-indexes/Leetcode-Medium/index.md
          - Hard: cn/solution-indexes/Leetcode-Hard/index.md
      - 支持语言: cn/languages.md
      - 题解验证: cn/validation.md
      - Ollama 和计算节点: cn/ollama.md
      - Ollama 安装: cn/ollama-install.md
      - Agent 生成流程: cn/agent.md
      - MkDocs: cn/mkdocs.md
      - GitHub Actions: cn/github-actions.md
      - 端到端流程: cn/workflow.md
      - PRD: cn/prd.md
      - MkDocs 站点 PRD: cn/mkdocs_prd.md
      - GitHub Actions PRD: cn/github_action_prd.md
